<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --app-height: 100dvh;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617;
            height: var(--app-height);
            width: 100vw;
            overflow: hidden;
            color: #f8fafc;
            margin: 0;
            padding: 0;
        }

        #app {
            height: var(--app-height);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card-swipe {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease, background-color 0.2s ease;
            touch-action: none;
            will-change: transform, opacity;
            z-index: 10;
        }

        .swipe-right-out { transform: translateX(150vw) rotate(45deg) !important; opacity: 0 !important; }
        .swipe-left-out { transform: translateX(-150vw) rotate(-45deg) !important; opacity: 0 !important; }
        
        .card-feedback-overlay {
            position: absolute;
            inset: 0;
            border-radius: inherit;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 5;
        }

        @keyframes cardEntry {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-card-entry { animation: cardEntry 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .fade-in { animation: fadeIn 0.3s ease forwards; }
    </style>
</head>

            { id: "52", term: "Diagnostic stratégique", def: "Phase d'analyse interne/externe pour aide à la décision." },
            { id: "90", term: "Marge commerciale", def: "Différence entre prix de vente HT et coût d'achat HT." },
            { id: "85", term: "Loi ALUR", def: "Loi soumettant les drives à autorisation d'exploitation." },
            { id: "81", term: "Landing page", def: "Page web d'arrivée conçue pour une action précise." },
            { id: "79", term: "INPI", def: "Institut protégeant marques, brevets et modèles en France." },
            { id: "76", term: "Incident", def: "Événement non anticipé pouvant avoir des conséquences." },
            { id: "73", term: "Hauteur", def: "Niveau de prix de l'assortiment (Bas, Moyen, Élevé)." },
            { id: "67", term: "Freins", def: "Forces négatives empêchant l'achat (peurs, inhibitions)." },
            { id: "66", term: "Facteurs explicatifs", def: "Éléments décrivant l'individu (âge, revenu, style de vie)." },
            { id: "64", term: "E-réputation", def: "Image d'une marque sur internet et supports numériques." },
            { id: "63", term: "Entretien", def: "Dépenses pour maintenir les actifs en bon état." },
            { id: "43", term: "Couverture d'un risque", def: "Protection via assurances ou garanties contractuelles." },
            { id: "37", term: "Consommaction", def: "Défense active des intérêts des consommateurs." },
            { id: "31", term: "Communication hors médias", def: "Moyens de communication n'utilisant pas les médias de masse." }
        ];

        // Fonction pour mélanger l'array au chargement pour plus de variété
        const fullLexicon = [...rawLexicon].sort(() => Math.random() - 0.5);

        let userStats = {};
        let currentUser = null;
        let currentSession = [];
        let sessionIndex = 0;
        let sessionResults = { correct: 0, wrong: 0 };
        let sessionMode = '';

        let startX = 0, currentX = 0, isDragging = false;
        const card = document.getElementById('card-element');
        const cardOverlay = document.getElementById('card-overlay');
        const swipeHints = document.getElementById('swipe-hints');

        window.showScreen = (id) => {
            ['loading', 'screen-home', 'screen-game', 'screen-summary', 'screen-progress'].forEach(s => {
                const el = document.getElementById(s);
                if (el) el.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            if (id === 'screen-progress') updateProgressUI();
            if (id === 'screen-home') updateHomeUI();
        };

        const updateHomeUI = () => {
            const masteredCount = fullLexicon.filter(t => {
                const s = userStats[t.id] || { c: 0, w: 0 };
                return s.c > s.w && s.c >= 2;
            }).length;
            const percentage = Math.round((masteredCount / fullLexicon.length) * 100);
            document.getElementById('global-mastery').innerText = `${percentage}%`;
            document.getElementById('mastery-circle').style.strokeDashoffset = 276 - (276 * percentage / 100);
        };

        const updateProgressUI = () => {
            const list = document.getElementById('progress-list');
            list.innerHTML = '';
            // On affiche le progrès dans l'ordre du lexique mélangé
            fullLexicon.forEach(item => {
                const s = userStats[item.id] || { c: 0, w: 0 };
                const ratio = s.c + s.w > 0 ? Math.round((s.c / (s.c + s.w)) * 100) : 0;
                const div = document.createElement('div');
                div.className = "p-4 bg-slate-900 rounded-2xl border border-slate-800";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <h4 class="font-bold text-white text-[11px]">${item.term}</h4>
                        <span class="text-[8px] font-black text-indigo-500 uppercase">${ratio}%</span>
                    </div>
                    <p class="text-slate-500 text-[9px] leading-tight mb-2">${item.def}</p>
                `;
                list.appendChild(div);
            });
        };

        window.startSession = (mode) => {
            sessionMode = mode; sessionIndex = 0; sessionResults = { correct: 0, wrong: 0 };
            
            // 70% nouveaux/erreurs, 30% révision
            const scored = fullLexicon.map(item => {
                const s = userStats[item.id] || { c: 0, w: 0 };
                return { ...item, p: (s.w + 1) / (s.c + 0.5), isMastered: s.c >= 2 && s.c > s.w };
            });

            const toLearn = scored.filter(i => !i.isMastered).sort((a,b) => b.p - a.p).slice(0, 18);
            const toReview = scored.filter(i => i.isMastered).sort(() => Math.random() - 0.5).slice(0, 7);

            currentSession = [...toLearn, ...toReview].sort(() => Math.random() - 0.5);
            window.showScreen('screen-game');
            updateQuestionUI();
        };

        const updateQuestionUI = () => {
            const item = currentSession[sessionIndex];
            const stats = userStats[item.id] || { c: 0, w: 0 };
            card.classList.remove('swipe-right-out', 'swipe-left-out', 'animate-card-entry');
            card.style.transform = "translateX(0) rotate(0) scale(1)"; card.style.opacity = "1"; cardOverlay.style.opacity = "0";
            void card.offsetWidth; card.classList.add('animate-card-entry');

            document.getElementById('question-counter').innerText = `${sessionIndex+1}/${currentSession.length}`;
            document.getElementById('session-progress-bar').style.width = `${(sessionIndex / currentSession.length) * 100}%`;
            document.getElementById('historical-stats').innerHTML = `<span class="text-emerald-500">${stats.c} ✓</span> <span class="text-rose-500">${stats.w} ✕</span>`;
            document.getElementById('display-text').innerText = sessionMode === 'termToDef' ? item.term : item.def;
            document.getElementById('answer-text').innerText = sessionMode === 'termToDef' ? item.def : item.term;
            document.getElementById('answer-box').classList.add('hidden');
            document.getElementById('btn-reveal').classList.remove('hidden');
            document.getElementById('swipe-instruction').classList.add('hidden');
            isDragging = false; startX = 0; currentX = 0;
        };

        window.revealAnswer = () => {
            document.getElementById('answer-box').classList.remove('hidden');
            document.getElementById('btn-reveal').classList.add('hidden');
            document.getElementById('swipe-instruction').classList.remove('hidden');
        };

        const processValidation = async (isCorrect) => {
            const item = currentSession[sessionIndex];
            if (!userStats[item.id]) userStats[item.id] = { c: 0, w: 0 };
            if (isCorrect) { userStats[item.id].c++; sessionResults.correct++; }
            else { userStats[item.id].w++; sessionResults.wrong++; }
            if (currentUser) setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'statistics', 'v1'), { stats: userStats }, { merge: true });
            sessionIndex++;
            setTimeout(() => {
                if (sessionIndex < currentSession.length) updateQuestionUI();
                else {
                    document.getElementById('summary-correct').innerText = sessionResults.correct;
                    document.getElementById('summary-wrong').innerText = sessionResults.wrong;
                    window.showScreen('screen-summary');
                }
            }, 300);
        };

        window.exitSession = () => document.getElementById('modal-exit').classList.remove('hidden');
        window.confirmExit = (s) => { document.getElementById('modal-exit').classList.add('hidden'); if(s) window.showScreen('screen-home'); };

        const handleDragStart = (e) => { if (document.getElementById('answer-box').classList.contains('hidden')) return; isDragging = true; startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX; currentX = startX; card.style.transition = "none"; card.classList.remove('animate-card-entry'); };
        const handleDragMove = (e) => { if (!isDragging) return; currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX; const dx = currentX - startX; card.style.transform = `translateX(${dx}px) rotate(${dx / 20}deg)`; swipeHints.style.opacity = Math.min(Math.abs(dx) / 80, 1); swipeHints.querySelector('.text-rose-500').parentElement.style.opacity = dx < 0 ? 1 : 0; swipeHints.querySelector('.text-emerald-500').parentElement.style.opacity = dx > 0 ? 1 : 0; cardOverlay.style.opacity = Math.min(Math.abs(dx) / 200, 0.3); cardOverlay.style.backgroundColor = dx > 0 ? "#10b981" : "#f43f5e"; if (Math.abs(dx) > 10 && e.cancelable) e.preventDefault(); };
        const handleDragEnd = () => { if (!isDragging) return; isDragging = false; const dx = currentX - startX; card.style.transition = "transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s ease"; swipeHints.style.opacity = "0"; cardOverlay.style.opacity = "0"; if (dx > 80) { card.classList.add('swipe-right-out'); processValidation(true); } else if (dx < -80) { card.classList.add('swipe-left-out'); processValidation(false); } else { card.style.transform = "translateX(0) rotate(0)"; } };

        card.addEventListener('mousedown', handleDragStart); card.addEventListener('touchstart', handleDragStart, { passive: true });
        window.addEventListener('mousemove', handleDragMove); window.addEventListener('touchmove', handleDragMove, { passive: false });
        window.addEventListener('mouseup', handleDragEnd); window.addEventListener('touchend', handleDragEnd);

        onAuthStateChanged(auth, async (u) => { if (u) { currentUser = u; const d = await getDoc(doc(db, 'artifacts', appId, 'users', u.uid, 'statistics', 'v1')); userStats = d.exists() ? d.data().stats || {} : {}; window.showScreen('screen-home'); } });
        window.onload = async () => { if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token).catch(() => signInAnonymously(auth)); else await signInAnonymously(auth); };
    </script>
</body>
</html>
