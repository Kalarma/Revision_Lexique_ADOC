<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Master Lexique Pro - Compétition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        :root { --app-height: 100dvh; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617;
            height: var(--app-height);
            width: 100vw;
            overflow: hidden;
            color: #f8fafc;
            margin: 0;
        }
        #app { height: var(--app-height); display: flex; flex-direction: column; position: relative; }
        .card-swipe { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease; }
        .swipe-right-out { transform: translateX(150vw) rotate(45deg) !important; opacity: 0 !important; }
        .swipe-left-out { transform: translateX(-150vw) rotate(-45deg) !important; opacity: 0 !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        .timer-bar { transition: width 1s linear; }
        
        /* Podium Animations */
        @keyframes crownPop { 0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .crown { animation: crownPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    </style>
</head>
<body class="selection:bg-indigo-500/30">

    <div id="app" class="w-full relative flex flex-col mx-auto">
        
        <div id="version-badge" class="absolute top-6 left-6 z-50">
            <span class="px-3 py-1.5 bg-indigo-500/20 text-indigo-400 font-black text-xs rounded-lg border border-indigo-500/30">V2.2.0 COMPÉTITIF</span>
        </div>

        <div id="screen-home" class="flex-grow w-full overflow-y-auto fade-in">
            <div class="flex flex-col p-6 max-w-md mx-auto w-full min-h-full">
                <header class="text-center py-6 mt-6">
                    <h1 class="text-4xl md:text-5xl font-black text-white italic uppercase tracking-tighter">Lexique <span class="text-indigo-500">Pro</span></h1>
                    <p class="text-slate-400 mt-2 font-black tracking-[0.3em] uppercase text-sm">Mode Classe</p>
                </header>

                <div class="bg-slate-900/80 p-5 rounded-3xl border border-slate-800 mb-8 flex items-center justify-between">
                    <div>
                        <h4 class="font-bold text-white text-sm">Mode Compétition</h4>
                        <p class="text-[10px] text-slate-500 font-bold uppercase">Multi-joueurs & Équipes</p>
                    </div>
                    <button id="comp-toggle" onclick="toggleCompMode()" class="w-14 h-8 rounded-full bg-slate-800 relative transition-colors border border-slate-700">
                        <div id="toggle-circle" class="absolute left-1 top-1 w-6 h-6 rounded-full bg-slate-600 transition-all"></div>
                    </button>
                </div>

                <div id="home-stats-box" class="bg-slate-900/50 rounded-[2.5rem] p-6 border border-slate-800 text-center mb-8">
                     <div id="global-mastery" class="text-3xl font-black text-emerald-400">0%</div>
                     <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Maîtrise Globale</p>
                </div>

                <button id="btn-main-play" onclick="startMainAction()" class="w-full p-6 bg-indigo-600 text-white font-black uppercase rounded-3xl shadow-xl active:scale-95 transition-all mb-4 text-xl">
                    Jouer
                </button>
                
                <button id="btn-progression" onclick="window.showScreen('screen-progress')" class="w-full py-4 text-slate-500 font-black uppercase text-xs tracking-widest">
                    Voir la liste des mots
                </button>
            </div>
        </div>

        <div id="screen-setup" class="hidden flex-grow w-full overflow-y-auto fade-in">
            <div class="flex flex-col p-6 max-w-md mx-auto w-full min-h-full">
                <h2 class="text-2xl font-black text-white mb-6 uppercase italic">Configuration</h2>
                
                <div class="space-y-4 mb-8">
                    <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                        <label class="text-[10px] font-black text-slate-500 uppercase mb-2 block">Paramètres du match</label>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <span class="text-[9px] text-slate-400 block mb-1">TEMPS (SEC)</span>
                                <input id="setup-timer" type="number" value="15" class="w-full bg-slate-950 p-2 rounded-lg text-white font-bold border border-slate-800">
                            </div>
                            <div>
                                <span class="text-[9px] text-slate-400 block mb-1">POINTS / MOT</span>
                                <input id="setup-points" type="number" value="100" class="w-full bg-slate-950 p-2 rounded-lg text-white font-bold border border-slate-800">
                            </div>
                        </div>
                    </div>

                    <div id="setup-teams-list" class="space-y-2">
                        </div>
                    <button onclick="addTeamField()" class="w-full py-3 border-2 border-dashed border-slate-800 rounded-xl text-slate-500 font-bold text-xs uppercase hover:border-indigo-500 transition-colors">
                        + Ajouter une équipe
                    </button>
                </div>

                <button onclick="launchGame()" class="mt-auto w-full p-6 bg-indigo-600 text-white font-black uppercase rounded-3xl shadow-2xl">
                    C'est parti !
                </button>
            </div>
        </div>

        <div id="screen-game" class="hidden flex-grow w-full flex flex-col p-6 max-w-lg mx-auto">
            <header class="flex justify-between items-center mb-4">
                <div id="comp-team-indicator" class="flex items-center gap-3">
                    <div id="current-team-color" class="w-4 h-4 rounded-full"></div>
                    <span id="current-team-name" class="font-black text-white uppercase italic tracking-wider">TEAM</span>
                </div>
                <div class="text-right">
                    <span id="comp-round-counter" class="text-xs font-black text-slate-500">1/10</span>
                </div>
            </header>

            <div id="timer-container" class="w-full bg-slate-900 h-2 rounded-full mb-6 overflow-hidden border border-slate-800">
                <div id="timer-bar" class="bg-indigo-500 h-full w-full timer-bar"></div>
            </div>

            <div id="card-element" class="flex-grow bg-slate-900 rounded-[3rem] border-2 border-slate-800 p-8 flex flex-col items-center justify-center text-center shadow-2xl relative mb-6">
                <h2 id="display-text" class="text-2xl font-bold text-white leading-tight"></h2>
                <div id="answer-box" class="hidden mt-8 pt-8 border-t border-slate-800/50 w-full fade-in">
                    <p id="answer-text" class="text-indigo-400 italic text-lg font-medium"></p>
                </div>
            </div>

            <div id="game-controls" class="space-y-4">
                <button id="btn-reveal" onclick="revealCompetitionAnswer()" class="w-full py-5 bg-white text-slate-950 font-black uppercase rounded-2xl shadow-xl">Voir la réponse</button>
                
                <div id="comp-validation" class="hidden grid grid-cols-2 gap-4">
                    <button onclick="handleCompResult(false)" class="py-5 bg-rose-500/10 text-rose-500 border border-rose-500/20 rounded-2xl font-black">FAUX</button>
                    <button onclick="handleCompResult(true)" class="py-5 bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 rounded-2xl font-black">JUSTE</button>
                </div>
            </div>
        </div>

        <div id="screen-transition" class="hidden flex-grow flex flex-col items-center justify-center p-6 text-center">
            <h2 class="text-slate-500 font-black text-xs uppercase mb-8">Scoreboard Actuel</h2>
            <div id="transition-scores" class="w-full space-y-4 mb-10 max-w-sm">
                </div>
            <button onclick="nextRound()" class="w-full max-w-sm p-6 bg-indigo-600 text-white font-black uppercase rounded-2xl shadow-xl">Tour Suivant</button>
        </div>

        <div id="screen-podium" class="hidden flex-grow flex flex-col items-center justify-center p-6">
            <h2 class="text-4xl font-black text-white italic uppercase mb-12">Grand Gagnant</h2>
            <div id="podium-display" class="flex items-end justify-center gap-4 h-64 w-full">
                </div>
            <button onclick="location.reload()" class="mt-12 w-full max-w-sm p-5 bg-slate-800 text-white font-black uppercase rounded-2xl">Retour Accueil</button>
        </div>

    </div>

    <script type="module">
        // DONNÉES
        const lexiconItems = [
            { id: "1", term: "Accords de référencement", def: "Relation producteur/distributeur sur produit, prix, conditions, livraisons." },
            { id: "2", term: "Affichage digital", def: "Écrans numériques permettant un affichage dynamique." },
            { id: "3", term: "Agencement", def: "Aménagement de l'espace pour optimiser l'ergonomie et la valeur." },
            { id: "4", term: "Ajustement linéaire", def: "Modèle pour établir des estimations futures via les données passées." },
            { id: "5", term: "Alignement", def: "Fixation d'un prix identique aux concurrents directs ou au leader." },
            { id: "6", term: "Analyse ABC", def: "Segmentation : A (20%=80%), B (30%=15%), C (50%=5%)." },
            { id: "7", term: "Analyse PESTEL", def: "Politique, Économique, Sociologique, Techno, Éco, Légal." },
            { id: "8", term: "Analyse SWOT", def: "Diagnostic : Forces/Faiblesses et Opportunités/Menaces." },
            { id: "9", term: "Assortiment", def: "Ensemble des produits et services proposés à la vente." },
            { id: "10", term: "Benchmarking", def: "Étude des techniques d'organisation d'autres entreprises." }
            // ... (tes 130 mots ici)
        ];

        // ÉTAT DU JEU
        let isCompActive = false;
        let teams = [];
        let currentRound = 0;
        let teamTurn = 0;
        let gamePool = [];
        let timerInterval;
        let settings = { time: 15, pts: 100 };

        const colors = ['#6366f1', '#f43f5e', '#10b981', '#f59e0b', '#a855f7', '#06b6d4'];

        // INITIALISATION
        window.toggleCompMode = () => {
            isCompActive = !isCompActive;
            const circle = document.getElementById('toggle-circle');
            const bg = document.getElementById('comp-toggle');
            const stats = document.getElementById('home-stats-box');
            
            if(isCompActive) {
                circle.style.transform = "translateX(24px)";
                circle.style.backgroundColor = "#6366f1";
                bg.style.backgroundColor = "#1e1b4b";
                stats.style.opacity = "0.3";
            } else {
                circle.style.transform = "translateX(0)";
                circle.style.backgroundColor = "#475569";
                bg.style.backgroundColor = "#1e293b";
                stats.style.opacity = "1";
            }
        };

        window.startMainAction = () => {
            if(isCompActive) {
                window.showScreen('screen-setup');
                if(teams.length === 0) { addTeamField(); addTeamField(); }
            } else {
                // Logique Solo Classique (ton ancienne logique)
                alert("Mode Solo lancé !");
            }
        };

        window.addTeamField = () => {
            const list = document.getElementById('setup-teams-list');
            const id = list.children.length;
            if(id >= 6) return;
            const div = document.createElement('div');
            div.className = "flex items-center gap-3 bg-slate-950 p-2 rounded-xl border border-slate-800 fade-in";
            div.innerHTML = `
                <div class="w-4 h-4 rounded-full" style="background:${colors[id]}"></div>
                <input type="text" placeholder="Équipe ${id+1}" class="bg-transparent flex-grow text-white font-bold outline-none team-input">
            `;
            list.appendChild(div);
        };

        window.showScreen = (id) => {
            document.querySelectorAll('#app > div').forEach(s => {
                if(s.id.startsWith('screen-')) s.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        };

        window.launchGame = () => {
            const inputs = document.querySelectorAll('.team-input');
            teams = [];
            inputs.forEach((input, i) => {
                if(input.value.trim()) {
                    teams.push({ name: input.value, score: 0, color: colors[i] });
                }
            });

            settings.time = parseInt(document.getElementById('setup-timer').value);
            settings.pts = parseInt(document.getElementById('setup-points').value);
            
            gamePool = [...lexiconItems].sort(() => Math.random() - 0.5);
            currentRound = 0;
            teamTurn = 0;
            
            window.showScreen('screen-game');
            startRound();
        };

        function startRound() {
            const item = gamePool[currentRound];
            document.getElementById('current-team-name').innerText = teams[teamTurn].name;
            document.getElementById('current-team-color').style.backgroundColor = teams[teamTurn].color;
            document.getElementById('comp-round-counter').innerText = `${currentRound + 1}/${gamePool.length}`;
            
            document.getElementById('display-text').innerText = item.term;
            document.getElementById('answer-text').innerText = item.def;
            
            document.getElementById('answer-box').classList.add('hidden');
            document.getElementById('comp-validation').classList.add('hidden');
            document.getElementById('btn-reveal').classList.remove('hidden');

            startTimer();
        }

        function startTimer() {
            const bar = document.getElementById('timer-bar');
            bar.style.transition = 'none';
            bar.style.width = '100%';
            
            setTimeout(() => {
                bar.style.transition = `width ${settings.time}s linear`;
                bar.style.width = '0%';
            }, 50);

            timerInterval = setTimeout(() => {
                revealCompetitionAnswer();
            }, settings.time * 1000);
        }

        window.revealCompetitionAnswer = () => {
            clearTimeout(timerInterval);
            document.getElementById('timer-bar').style.width = '0%';
            document.getElementById('answer-box').classList.remove('hidden');
            document.getElementById('btn-reveal').classList.add('hidden');
            document.getElementById('comp-validation').classList.remove('hidden');
        };

        window.handleCompResult = (isCorrect) => {
            if(isCorrect) teams[teamTurn].score += settings.pts;
            showTransition();
        };

        function showTransition() {
            window.showScreen('screen-transition');
            const list = document.getElementById('transition-scores');
            list.innerHTML = teams.map((t, i) => `
                <div class="flex items-center justify-between bg-slate-900 p-4 rounded-2xl border border-slate-800">
                    <div class="flex items-center gap-3 text-white font-bold">
                        <div class="w-3 h-3 rounded-full" style="background:${t.color}"></div>
                        ${t.name}
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="adjustScore(${i}, -10)" class="text-slate-600">-</button>
                        <span class="font-black text-indigo-400 w-12">${t.score}</span>
                        <button onclick="adjustScore(${i}, 10)" class="text-slate-600">+</button>
                    </div>
                </div>
            `).join('');
        }

        window.adjustScore = (idx, val) => {
            teams[idx].score += val;
            showTransition();
        };

        window.nextRound = () => {
            currentRound++;
            teamTurn = (teamTurn + 1) % teams.length;
            
            if(currentRound >= gamePool.length || currentRound >= 10) { // Limite 10 manches pour l'exemple
                showPodium();
            } else {
                window.showScreen('screen-game');
                startRound();
            }
        };

        function showPodium() {
            window.showScreen('screen-podium');
            const sorted = [...teams].sort((a,b) => b.score - a.score);
            const podium = document.getElementById('podium-display');
            
            // On affiche le top 3 (ou moins)
            podium.innerHTML = sorted.slice(0,3).map((t, i) => {
                const heights = ['h-48', 'h-32', 'h-24'];
                const orders = ['order-2', 'order-1', 'order-3'];
                return `
                    <div class="flex flex-col items-center ${orders[i]}">
                        ${i === 0 ? '<span class="crown text-4xl mb-2">👑</span>' : ''}
                        <div class="w-16 bg-slate-800 rounded-t-xl flex flex-col items-center justify-end pb-4 border-t-4 ${heights[i]}" style="border-color:${t.color}">
                            <span class="text-white font-black">${t.score}</span>
                        </div>
                        <span class="text-[10px] font-bold text-slate-500 mt-2 uppercase">${t.name}</span>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
